; ┌──────────────────────────────────────────────────────────────────────────┐
; │  [ANGLE]   ANGLE backend selection / Выбор backend-а ANGLE               │
; └──────────────────────────────────────────────────────────────────────────┘
[ANGLE]

; EN: Direct3D backend used by ANGLE (libGLESv2). d3d11 is verified working
;     on GT 630M after our fixes (vtable slot, DXGI struct, isFlipModel gate).
; RU: Backend Direct3D, который ANGLE использует под капотом. d3d11 проверен
;     на GT 630M (с нашими фиксами vtable slot, DXGI layout, isFlipModel).
backend=d3d11

; EN: Persistent log file (one fopen for the process lifetime; no per-call
;     hitches). Set to false in production to skip even the buffered writes.
; RU: Отладочный лог (один fopen на весь процесс, без микрофризов от записи).
;     Поставь false в production чтобы не тратить даже фоновые буферные записи.
debug=false

; EN: Where to write the debug log (relative to GD.exe working dir).
; RU: Куда писать отладочный лог (путь относительно GD.exe).
log_file=angle_log.txt


; ┌──────────────────────────────────────────────────────────────────────────┐
; │  [Boost]   Base process tuning (system-level, no GL) / Базовый тюнинг    │
; └──────────────────────────────────────────────────────────────────────────┘
[Boost]

; EN: Exports NvOptimusEnablement=1 + AmdPowerXpressRequest=1 — wakes up the
;     dGPU on Optimus laptops. On your hardware this routes GD to GT 630M
;     instead of Intel HD 4000 (verified via GL_RENDERER log).
; RU: Экспортирует магические символы NvOptimusEnablement / AmdPowerXpress,
;     заставляющие Optimus-ноут переключиться на дискретку. У тебя GD теперь
;     рендерится на GT 630M вместо Intel HD 4000 (видно в логе GL_RENDERER).
;     [✅ ON — confirmed GT 630M active]
gpu_forcer=true

; EN: Replaces the default heap allocator with a faster one (lock-free pool).
;     Free perf, no risk; ~3-5% on alloc-heavy frames.
; RU: Заменяет стандартный аллокатор на более быстрый (lock-free пул).
;     Бесплатный буст ~3-5% на frame-ах с аллокациями, без рисков.
;     [✅ ON]
fast_allocator=true

; EN: timeBeginPeriod(1) — sub-millisecond Sleep granularity. Required for
;     precise frame pacing; otherwise Sleep can drift up to 15.6 ms.
; RU: Включает 1 ms точность Sleep. Без этого пацер фреймов теряет точность
;     до ~15 ms, фпс будет плавать.
;     [✅ ON]
timer_fix=true

; EN: ABOVE_NORMAL process priority + main thread HIGHEST. Helps when other
;     apps fight for CPU. Doesn't slow other apps significantly.
; RU: Поднимает приоритет процесса до ABOVE_NORMAL и главного потока до
;     HIGHEST. Помогает когда фоном жрут CPU. Других прог сильно не тормозит.
;     [✅ ON]
thread_boost=true

; EN: CPU affinity mask (0 = let scheduler pick). With only 2 hardware threads
;     on Ivy Bridge, manual pinning is wasteful — the OS does better.
; RU: Маска CPU affinity (0 = автомат). На твоём 2-поточном Ivy Bridge ручной
;     pin бесполезен, ОС сама раскидает лучше.
;     [✅ 0 = auto]
cpu_affinity=0

; EN: SSE2 fast math intrinsics. Ivy Bridge supports AVX, totally safe.
; RU: SSE2 fast-math инструкции. Ivy Bridge точно поддерживает, риска нет.
;     [✅ ON]
sse_math=true

; EN: Disables Windows 10 PROCESS_POWER_THROTTLING (EcoQoS). Prevents OS from
;     downclocking GD when it thinks the app is idle.
; RU: Отключает Windows 10 EcoQoS — операционка перестаёт даунклокать GD
;     думая что он "в простое". Прибавка к стабильности FPS.
;     [✅ ON]
power_boost=true


; ┌──────────────────────────────────────────────────────────────────────────┐
; │  [BoostAdvanced]   Advanced features / Продвинутые фичи              │
; └──────────────────────────────────────────────────────────────────────────┘
[BoostAdvanced]

; EN: On-the-fly RGBA8 → DXT1 texture compression (4× less VRAM). Breaks
;     rendering on ANGLE FL9 path — KEEP OFF on this hardware.
; RU: Сжимает текстуры RGBA8 → DXT1 на лету (4× меньше VRAM). Ломает рендер
;     на FL9-пути ANGLE — НЕ ВКЛЮЧАЙ на твоём железе.
;     [❌ OFF — breaks textures on FL9 path]
tex_compress=true

; EN: NVAPI driver profile init — signals to Nvidia driver "I'm a heavy GPU
;     app, give me max perf". Now correctly loads nvapi64.dll on x64 (was
;     looking for the wrong filename) and uses void* return type for
;     QueryInterface (was truncating 64-bit pointers → DEP crash).
; RU: Инициализирует NVAPI чтобы драйвер Nvidia включил max-perf профиль для
;     GD. Чинено: грузит nvapi64.dll на x64 (раньше искал nvapi.dll), и
;     QueryInterface возвращает void* (раньше int → truncation → DEP crash).
;     [✅ ON — verified 'nvapi: initialized successfully']
nvapi_profile=true

; EN: Saves compiled HLSL bytecode to disk between runs. Big win on slow
;     CPUs — 2nd launch skips shader compilation stalls.
; RU: Кеширует скомпилированный HLSL-байткод между запусками. Большой плюс
;     на слабом CPU — со 2-го запуска нет stutter-ов от компиляции шейдеров.
;     [✅ ON]
shader_cache=true

; EN: Folder for the shader cache (relative to GD.exe).
; RU: Папка для кеша шейдеров (относительно GD.exe).
shader_cache_dir=shader_cache

; EN: Patches the PE header to enable IMAGE_FILE_LARGE_ADDRESS_AWARE — gives
;     GD access to 4 GB virtual memory instead of 2 GB. Useful for big levels.
; RU: Патчит PE-заголовок чтобы GD мог использовать 4 GB virtual памяти
;     вместо 2 GB. Полезно для больших уровней с тысячами объектов.
;     [✅ ON]
large_address_aware=true

; EN: Skips redundant glBindTexture / glUseProgram / glActiveTexture calls
;     when the bound state hasn't changed. Saves driver round-trips.
; RU: Пропускает повторные glBindTexture/glUseProgram/glActiveTexture когда
;     стейт не менялся. Экономит обращения к драйверу.
;     [✅ ON]
gl_state_dedup=true

; EN: Pre-faults GD's code pages into RAM. OFF — the existing code path was
;     causing init stalls on this hardware.
; RU: Префолтит страницы кода GD в RAM. ВЫКЛ — на этом железе вызывает
;     задержки при старте.
;     [❌ OFF — causes init stalls]
working_set_prefetch=true

; EN: FMOD audio engine tuning (sample rate, buffer size). OFF — IAT hook
;     on FMOD is known to crash on some builds.
; RU: Тюнит FMOD (sample rate, размер буфера). ВЫКЛ — IAT hook на FMOD
;     иногда крашит игру.
;     [❌ OFF — IAT hook crash risk]
fmod_tuning=true
fmod_sample_rate=44100

; EN: Parallel asset loader (separate threadpool for png/plist). OFF — your
;     CPU has only 2 hardware threads, the workers would starve the main loop.
; RU: Параллельная загрузка ассетов (свой пул потоков). ВЫКЛ — у тебя всего
;     2 hw-потока, воркеры будут голодать главный цикл.
;     [❌ OFF — only 2 CPU threads available]
async_asset_loader=true
async_loader_threads=2

; EN: eglSwapInterval(0) — disables VSync at EGL level. Combined with
;     unlock_fps_cap this lets the GPU run as fast as it can.
; RU: eglSwapInterval(0) — выключает VSync на уровне EGL. Вместе с
;     unlock_fps_cap позволяет GPU выдавать максимум.
;     [✅ ON]
force_no_vsync=true

; EN: Replaces Windows Sleep() with high-resolution spin-wait for ≤2 ms
;     delays. IAT hook target wasn't found on this build (logged as failed),
;     but enabling is harmless — module skips when target absent.
; RU: Заменяет Sleep() на точный spin-wait для коротких пауз (≤2 ms). IAT
;     hook не нашёл цель на этой сборке (видно в логе "IAT hook failed"), но
;     включить безопасно — модуль просто скипнется.
;     [⚠️ ON — IAT hook target not found, but harmless]
precise_sleep=true

; EN: Periodic HeapCompact() interval in seconds. 0 = disabled. Heap compact
;     during gameplay causes 50-200 ms stutter — keep 0.
; RU: Период вызова HeapCompact() в секундах. 0 = выкл. HeapCompact во время
;     геймплея даёт 50-200 ms заикания — оставь 0.
;     [❌ 0 = disabled]
heap_compact_interval=0

; EN: ID3D11Multithread::SetMultithreadProtected. OFF — gated by backend in
;     code; on D3D11 ANGLE manages threading itself, this conflicts.
; RU: D3D11 multithread protection. ВЫКЛ — конфликтует с собственным
;     threading-ом ANGLE на D3D11 backend.
;     [❌ OFF — ANGLE conflict]
d3d11_multithread=true


; ┌──────────────────────────────────────────────────────────────────────────┐
; │  [BoostRender]   Render-pipeline tuning / Тюнинг рендер-пайплайна    │
; └──────────────────────────────────────────────────────────────────────────┘
[BoostRender]

; EN: Disables depth test/clear. OFF — GD uses depth buffer for trigger
;     ordering on certain levels.
; RU: Выключает depth test/clear. ВЫКЛ — GD использует depth для порядка
;     срабатывания триггеров.
;     [❌ OFF — breaks triggers]
depth_off=true

; EN: Skip mipmap generation. Big VRAM/bandwidth save on weak GPU like
;     GT 630M. GD doesn't sample at distance, so no quality loss.
; RU: Пропускает генерацию mipmap-ов. Большая экономия VRAM/полосы на слабой
;     GT 630M. GD не сэмплит с дальних дистанций — потери качества нет.
;     [✅ ON — big win on GT 630M]
mipmap_off=true

; EN: glFinish() → no-op. cocos2d sometimes calls Finish after frame which
;     stalls the pipeline. Safe to skip; eglSwapBuffers does proper sync.
; RU: glFinish() становится no-op. cocos2d иногда зовёт Finish после кадра,
;     это блокирует пайплайн. Безопасно пропустить, eglSwapBuffers сам
;     синхронизирует.
;     [✅ ON]
noop_finish=true

; EN: glGetError() → GL_NO_ERROR. Saves driver round-trip. Combined with
;     gl_no_error context (in [BoostLatency]) this is fully safe.
; RU: glGetError() всегда возвращает GL_NO_ERROR. Экономит обращение к
;     драйверу. Безопасно в паре с gl_no_error контекстом.
;     [✅ ON]
noop_geterror=true

; EN: Persistent VBO pool. OFF — cocos2d's own batcher manages VBOs,
;     overlap causes jitter.
; RU: Пул VBO. ВЫКЛ — cocos2d сам управляет VBO-ами, наш пул создаёт jitter.
;     [❌ OFF — conflicts with cocos2d batcher]
vbo_pool=true
vbo_pool_size_mb=16

; EN: Vertex format compression (FP32 → FP16). OFF — risky, can break UV
;     interpolation on text/UI sprites.
; RU: Сжимает vertex-формат FP32 → FP16. ВЫКЛ — рискованно, может ломать
;     UV-интерполяцию на тексте/UI.
;     [❌ OFF — risky]
vertex_compress=true

; EN: glDrawElementsInstanced batching. OFF — would require rewriting
;     cocos2d's draw calls, vertex layout mismatch.
; RU: Инстансинг через glDrawElementsInstanced. ВЫКЛ — потребует переписать
;     draw-вызовы cocos2d, не совпадёт vertex layout.
;     [❌ OFF — vertex layout mismatch]
instancing=true

; EN: Dynamic resolution scaling on FPS dips. OFF — causes visible jitter,
;     better predictable FPS via frame pacing.
; RU: Динамическое масштабирование разрешения при просадках. ВЫКЛ — даёт
;     видимый jitter, лучше предсказуемый FPS через пацер.
;     [❌ OFF — visual jitter]
dyn_resolution=true
dyn_res_target_fps=60


; ┌──────────────────────────────────────────────────────────────────────────┐
; │  [BoostIO]   I/O tuning / Тюнинг I/O                                 │
; └──────────────────────────────────────────────────────────────────────────┘
[BoostIO]

; EN: CreateFile with FILE_FLAG_SEQUENTIAL_SCAN. IAT hook target wasn't
;     found on this build (logged as failed), enabling is harmless.
; RU: CreateFile с FILE_FLAG_SEQUENTIAL_SCAN — ускоряет чтение plist/png.
;     IAT hook не нашёл цель на этой сборке, включить безопасно.
;     [⚠️ ON — IAT hook target not found, but harmless]
fast_io=true

; EN: Copy Resources/ to a RAM-backed temp folder. OFF — needs ~500 MB free
;     RAM; you have 8 GB total which is tight with browser/IDE open.
; RU: Копирует Resources/ в RAM-папку. ВЫКЛ — нужно ~500 MB свободной RAM;
;     у тебя 8 GB всего, это тесно с браузером/IDE.
;     [❌ OFF — RAM-tight on 8 GB system]
ramdisk_cache=true
ramdisk_path=

; EN: Cache GetProcAddress / wglGetProcAddress lookups. Big win on cocos2d
;     which re-resolves the same procs every frame.
; RU: Кеш для GetProcAddress / wglGetProcAddress. Большой плюс — cocos2d
;     ре-резолвит одни и те же процы каждый кадр.
;     [✅ ON]
loader_cache=true


; ┌──────────────────────────────────────────────────────────────────────────┐
; │  [BoostCPU]   CPU-side tuning / Тюнинг на стороне CPU                │
; └──────────────────────────────────────────────────────────────────────────┘
[BoostCPU]

; EN: SSE2-optimized memcpy via IAT hook. OFF — the hook on memcpy crashes
;     on some Windows runtimes (CRT version mismatch).
; RU: SSE2 memcpy через IAT hook. ВЫКЛ — hook на memcpy крашится на разных
;     версиях Windows runtime (несовпадение CRT).
;     [❌ OFF — IAT hook crash risk]
sse_memcpy=true

; EN: Bounding volume hierarchy for scene culling. OFF — experimental,
;     not stable yet.
; RU: BVH-дерево для отсечения объектов. ВЫКЛ — экспериментально, ещё не
;     стабильно.
;     [❌ OFF — experimental]
scene_bvh=true

; EN: std::string interning via IAT hook on string ctor. OFF — hooking
;     string constructor crashes due to ABI variations.
; RU: String interning через IAT hook на конструкторе string. ВЫКЛ —
;     крашится из-за вариаций ABI.
;     [❌ OFF — IAT hook crash risk]
string_intern=true

; EN: Replace global new/delete with mimalloc. OFF — the mimalloc DLL is
;     not bundled with the mod.
; RU: Подменяет глобальные new/delete на mimalloc. ВЫКЛ — DLL mimalloc-а
;     не идёт в комплекте с модом.
;     [❌ OFF — DLL not bundled]
mimalloc_full=true

; EN: Silences printf, OutputDebugString, and other debug streams from
;     cocos2d/GD. Small but free perf win.
; RU: Глушит printf, OutputDebugString и прочие debug-потоки cocos2d/GD.
;     Маленький, но бесплатный буст.
;     [✅ ON]
silent_debug=true


; ┌──────────────────────────────────────────────────────────────────────────┐
; │  [BoostSystem]   System-level tuning / Системный уровень             │
; └──────────────────────────────────────────────────────────────────────────┘
[BoostSystem]

; EN: D3DKMTSetSchedulingPriorityClass(HIGH) for the GPU context — Windows
;     gives our render commands priority over other apps' GPU work.
; RU: Устанавливает приоритет HIGH для GPU-контекста через WDDM. Windows
;     отдаёт наши draw-вызовы вперёд других программ.
;     [✅ ON]
wddm_priority=true

; EN: Registers GD with Windows Game Mode — disables non-essential background
;     services and prioritises CPU/GPU.
; RU: Регистрирует GD в Windows Game Mode — Windows вырубает фоновые сервисы
;     и отдаёт приоритет железу.
;     [✅ ON]
game_mode=true

; EN: Pin main thread to performance cores on hybrid CPUs (Intel 12gen+).
;     Ivy Bridge isn't hybrid — module is a no-op, safe to leave on.
; RU: Пиннит главный поток на P-ядра на hybrid-CPU (Intel 12gen+). Ivy Bridge
;     не hybrid — модуль no-op, безопасно держать включённым.
;     [✅ ON — no-op on Ivy Bridge]
smart_cpu_pin=true

; EN: Disables Windows process mitigations (CFG, CET, ASLR-strict). OFF —
;     gives ~1-2% CPU back but reduces process security.
; RU: Отключает Windows mitigations (CFG, CET, strict ASLR). ВЫКЛ — даст
;     ~1-2% CPU, но снизит безопасность процесса.
;     [❌ OFF — security trade-off not worth it]
mitigation_off=true


; ┌──────────────────────────────────────────────────────────────────────────┐
; │  [BoostLatency]   Anti-stutter & input lag / Антистаттер и лаг ввода │
; └──────────────────────────────────────────────────────────────────────────┘
[BoostLatency]

; EN: DXGI_SWAP_CHAIN_FLAG_ALLOW_TEARING — full FPS bypass on D3D11 flip-
;     model swap chains. Gated by isFlipModel(swapEffect) — on your GT 630M
;     ANGLE picks BLIT model (swapEffect=1), so this is a safe no-op.
; RU: Флаг ALLOW_TEARING — полный FPS-bypass на D3D11 flip-model swap chain.
;     Гейчён по isFlipModel: на GT 630M ANGLE выбирает BLIT (swapEffect=1),
;     поэтому модуль ничего не делает (no-op, безопасно).
;     [✅ ON — gated, no-op on BLIT model]
allow_tearing=true

; EN: DXGI waitable swap chain — waits on a handle instead of blocking
;     inside Present(). Gated by backend==d3d11.
; RU: DXGI waitable swap chain — ждёт на handle вместо блокировки внутри
;     Present(). Гейчён по backend==d3d11.
;     [✅ ON — D3D11 only]
waitable_swap=true

; EN: QPC-based frame pacing with sleep+spin loop. ON by default — paired
;     with target=180 it gives the best gameplay feel on this hardware:
;     lowest input lag, smooth motion, no tearing. Set false only when
;     benchmarking raw max FPS throughput.
; RU: Frame pacing через QPC с sleep+spin. ВКЛ по умолчанию — в паре с
;     target=180 даёт лучшее ощущение: минимальный input lag, плавность,
;     без tearing-а. ВЫКЛ только для бенчмарка max FPS.
;     [✅ ON — best feel preset]
frame_pacing=true

; EN: Frame pacing target FPS. *** Set this BELOW your achievable peak FPS,
;     not above. *** Pacing only smooths drops if there's GPU headroom.
;
;       GT 630M peak (simple): ~230 FPS  =  4.3 ms/frame
;       GT 630M heavy effects:  ~120 FPS  =  8.3 ms/frame
;
;     Recommended:
;       120 — bulletproof during effects (8.3 ms budget, fits worst-case)
;        90 — matches monitor refresh, lowest jitter, smoothest feel
;       180 — only if you stay <180 FPS in heavy parts (NOT this hardware)
;       360 — BAD: above peak, pacer adds overhead with zero benefit
;
; RU: Целевой FPS пацера. *** Ставь НИЖЕ реального пика, не выше. ***
;     Пацер сглаживает просадки только если у GPU есть запас.
;
;       GT 630M простые места:  ~230 FPS  =  4.3 мс/кадр
;       GT 630M в эффектах:     ~120 FPS  =  8.3 мс/кадр
;
;     Рекомендую:
;       120 — пуленепробиваемо в эффектах (бюджет 8.3 мс перекрывает worst-case)
;        90 — ровно по refresh монитора, минимальный jitter, самое плавное
;       180 — только если в эффектах не падаешь ниже 180 (НЕ на этом железе)
;       360 — ПЛОХО: выше пика, пацер только добавляет overhead.
;     [✅ 120 — sustainable through effects on GT 630M]
frame_pacing_target=480

; EN: Registers main thread as MMCSS Pro Audio class — gets 1 ms scheduling
;     granularity (otherwise default is 15.6 ms quantum on Win10).
; RU: Регистрирует главный поток как MMCSS Pro Audio класс — получает 1 ms
;     гранулярность планирования (по умолчанию 15.6 ms квант).
;     [✅ ON]
mmcss_pro_audio=true

; EN: Pre-compile common shader programs at init. OFF — can crash on shader
;     compile errors; the disk cache (shader_cache=true) covers warmup anyway.
; RU: Предкомпиляция шейдеров при старте. ВЫКЛ — может падать при ошибках
;     компиляции; кеш на диске (shader_cache=true) и так покрывает warmup.
;     [❌ OFF — crash-risky]
shader_warmup=true

; EN: IDXGIDevice1::SetMaximumFrameLatency(1) — reduces input lag by ~2
;     frames vs default of 3. Now hits correct vtable slot 12 (was 11 =
;     GetGPUThreadPriority(INT*) which crashed with "write to 0x1").
; RU: IDXGIDevice1::SetMaximumFrameLatency(1) — снижает input lag на ~2
;     кадра против дефолтных 3. Чинено: теперь slot 12 (раньше 11 =
;     GetGPUThreadPriority(INT*), что крашило "write to 0x1").
;     [✅ ON — verified 'MaxFrameLatency=1 (was 3)']
low_latency=true

; EN: EGL_CONTEXT_OPENGL_NO_ERROR_KHR — disables ANGLE per-call GL parameter
;     validation. ~10-20% CPU saving on weak Ivy Bridge.
; RU: Контекст без валидации параметров GL — отключает per-call проверки
;     ANGLE. ~10-20% экономии CPU на слабом Ivy Bridge.
;     [✅ ON — big win on weak CPU]
gl_no_error=true

; EN: Hooks CCApplication::setAnimationInterval to remove cocos2d's FPS cap
;     (sets it to 1/1000 = 1 ms = 1000 FPS soft cap). Re-applied every
;     second so settings menu can't reset it back.
; RU: Хукает CCApplication::setAnimationInterval чтобы убрать cocos2d FPS-
;     cap (ставит 1/1000 = 1000 FPS soft cap). Переприменяется каждую
;     секунду на случай если settings menu скидывает обратно.
;     [✅ ON]
unlock_fps_cap=true

; EN: Disables Windows process affinity auto-update + EcoQoS thread
;     throttling. Eliminates 0.5-2 ms hitches from core migration.
; RU: Отключает автообновление affinity процесса + EcoQoS-троттлинг потока.
;     Убирает hitch-и 0.5-2 ms от миграции между ядрами.
;     [✅ ON]
anti_stutter=true


; ┌──────────────────────────────────────────────────────────────────────────┐
; │  [BoostGD]   GD-specific hacks / Хаки специально для GD              │
; └──────────────────────────────────────────────────────────────────────────┘
[BoostGD]

; EN: Skip RobTop intro splash screen. OFF — file-loading hooks risk save
;     corruption; intro is short anyway.
; RU: Пропуск splash-экрана. ВЫКЛ — file-hook рискован для сейвов, всё
;     равно интро короткое.
;     [❌ OFF — risk to saves]
skip_intro=true

; EN: Object pool for cocos2d nodes. OFF — vtable corruption risk on
;     CCNode subclasses.
; RU: Пул объектов для cocos2d-нод. ВЫКЛ — риск порчи vtable на наследниках
;     CCNode.
;     [❌ OFF — vtable corruption risk]
object_pool=true
object_pool_size=4096

; EN: Cache trigger evaluation results. OFF — caches go stale when triggers
;     move during level playback.
; RU: Кеш результатов триггеров. ВЫКЛ — кеш устаревает когда триггеры
;     двигаются по ходу уровня.
;     [❌ OFF — stale on moving triggers]
trigger_cache=true

; EN: Binary plist cache. OFF — risk of corrupting save plist files on a
;     bad write.
; RU: Бинарный кеш plist-ов. ВЫКЛ — риск порчи save-файлов при битой записи.
;     [❌ OFF — save corruption risk]
plist_binary=true
plist_cache_dir=plist_cache

; EN: Skip screen shake / flash effects. OFF — heuristic hooks are glitch-
;     prone, can hide effects on legit levels.
; RU: Пропуск shake/flash эффектов. ВЫКЛ — эвристические hook-и глючные,
;     могут прятать эффекты на нормальных уровнях.
;     [❌ OFF — visual glitches]
skip_shake_flash=true

; EN: Pre-decode level on load (separate threads). OFF — only 2 CPU threads
;     available, race with GD's own decoder.
; RU: Предекодирование уровня при загрузке (свои потоки). ВЫКЛ — у тебя
;     всего 2 CPU-потока, конкурирует с декодером GD.
;     [❌ OFF — only 2 CPU threads]
level_predecode=true
predecode_threads=2


; ┌──────────────────────────────────────────────────────────────────────────┐
; │  [BoostRenderAdv]   Advanced render / Продвинутый рендер             │
; └──────────────────────────────────────────────────────────────────────────┘
[BoostRenderAdv]

; EN: Merge texture atlases on the fly. OFF — UV remapping breaks textures
;     in custom levels.
; RU: Слияние атласов на лету. ВЫКЛ — переназначение UV ломает текстуры
;     в кастомных уровнях.
;     [❌ OFF — breaks UVs]
atlas_merge=true
atlas_size=2048

; EN: Frustum culling on cocos2d nodes. OFF — can hide objects on screen
;     edges due to incorrect bounding boxes.
; RU: Frustum-отсечение нод. ВЫКЛ — может прятать объекты у краёв экрана
;     из-за неверных bounding box-ов.
;     [❌ OFF — clips visible objects]
frustum_cull=true

; EN: FBO pool. OFF — complicates render-target switching, jitter source.
; RU: Пул FBO. ВЫКЛ — усложняет переключение рендер-таргетов, источник jitter.
;     [❌ OFF — jitter source]
fbo_cache=true
fbo_pool_size=8

; EN: Triple buffering. OFF — ANGLE doesn't honor our buffer-count hint
;     and the queued frames just add input lag.
; RU: Тройная буферизация. ВЫКЛ — ANGLE игнорит наш hint, плюс лишние
;     кадры в очереди = больше input lag.
;     [❌ OFF — ineffective + adds lag]
triple_buffer=true

; EN: Disable GL_MULTISAMPLE / MSAA. HUGE win on integrated/weak GPU like
;     GT 630M — MSAA 2× costs 30-50% performance.
; RU: Отключение MSAA. ОЧЕНЬ большой прирост на слабой GT 630M — MSAA 2×
;     жрёт 30-50% производительности.
;     [✅ ON — big win on GT 630M]
disable_aa=true

; EN: Optimize blend modes (skip alpha blend on opaque). OFF — breaks fade
;     transitions and additive blend modes.
; RU: Оптимизация blend-модов. ВЫКЛ — ломает fade-переходы и additive blend.
;     [❌ OFF — breaks transparency]
blend_optimize=true


; ┌──────────────────────────────────────────────────────────────────────────┐
; │  [BoostCocos]   Cocos2d-x engine hacks / Хаки движка cocos2d-x       │
; └──────────────────────────────────────────────────────────────────────────┘
[BoostCocos]

; EN: Limit max active particles. OFF by default — visual change, leave to
;     user choice. Set particle_max=150 if your level chokes on particles.
; RU: Лимит активных частиц. По умолчанию ВЫКЛ — визуальное изменение,
;     решай сам. Поставь particle_max=150 если уровень захлёбывается.
;     [❌ OFF by default — your visual choice]
particle_throttle=true
particle_max=300

; EN: Pre-warm texture cache at startup. OFF — slows first launch by ~3 s,
;     no measurable in-game gain.
; RU: Прогрев texture cache при старте. ВЫКЛ — замедляет первый запуск на
;     ~3 секунды, в игре прироста нет.
;     [❌ OFF — startup tax with no gain]
texcache_preload=true

; EN: Force-batch all sprites. OFF — modifies render state, causes sprite
;     glitches.
; RU: Принудительный batching всех спрайтов. ВЫКЛ — меняет render state,
;     даёт глитчи на спрайтах.
;     [❌ OFF — sprite glitches]
batch_force=true

; EN: Cache CCLabel-rendered glyphs. OFF — text recalc is cheap on cocos2d,
;     not worth the complexity.
; RU: Кеш отрендеренных глифов CCLabel. ВЫКЛ — пересчёт текста и так дешёв
;     на cocos2d, не стоит сложности.
;     [❌ OFF — minimal gain]
label_cache=true

; EN: Skip inactive timers in CCScheduler tick. Free perf, completely safe.
; RU: Пропуск неактивных таймеров в CCScheduler. Бесплатный буст, полностью
;     безопасно.
;     [✅ ON]
scheduler_skip=true

; EN: Sort draw calls by texture. OFF — breaks z-ordering of layered sprites
;     in editor mode.
; RU: Сортировка draw-вызовов по текстуре. ВЫКЛ — ломает порядок слоёв
;     спрайтов в редакторе.
;     [❌ OFF — breaks z-order]
drawcall_sort=true

; EN: Generate index buffers for batched sprites. OFF — vertex layout
;     mismatch with cocos2d's expectations.
; RU: Генерация index-буферов для batched-спрайтов. ВЫКЛ — vertex layout
;     не совпадает с тем что ждёт cocos2d.
;     [❌ OFF — layout mismatch]
index_buffer_gen=true


; ┌──────────────────────────────────────────────────────────────────────────┐
; │  [BoostSysAdv]   Advanced system / Продвинутый системный             │
; └──────────────────────────────────────────────────────────────────────────┘
[BoostSysAdv]

; EN: FTZ/DAZ flags on FPU (flush-to-zero / denormals-are-zero). OFF —
;     changes float behavior, can affect physics timing.
; RU: FTZ/DAZ флаги FPU. ВЫКЛ — меняет поведение float-ов, может повлиять
;     на физику.
;     [❌ OFF — affects physics]
ftz_daz=true

; EN: Disable Spectre/Meltdown CPU mitigations for this process. OFF —
;     security trade-off not worth ~1-2% gain.
; RU: Отключение Spectre/Meltdown mitigation-ов для процесса. ВЫКЛ —
;     безопасность не стоит ~1-2% прироста.
;     [❌ OFF — security trade-off]
spectre_off=true

; EN: NtSetInformationProcess(IoPriority=HIGH) — better disk priority for GD.
; RU: NtSetInformationProcess(IoPriority=HIGH) — приоритет диска для GD.
;     [✅ ON]
io_priority=true

; EN: ProcessMemoryPriority=5 (highest non-realtime). Reduces page-out
;     pressure during gameplay.
; RU: ProcessMemoryPriority=5 (макс кроме realtime). Снижает вероятность
;     выгрузки страниц памяти во время игры.
;     [✅ ON]
mem_priority=true

; EN: Trim main thread stack to 256 KB. OFF — cocos2d's CCNode tree
;     traversal can recurse deeply, risk of stack overflow.
; RU: Обрезка стека главного потока до 256 KB. ВЫКЛ — обход дерева CCNode
;     может уходить глубоко в рекурсию, риск переполнения стека.
;     [❌ OFF — recursion crash risk]
stack_trim=true


; ┌──────────────────────────────────────────────────────────────────────────┐
; │  [BoostPipeline]   Render pipeline experimental / Эксперименты       │
; └──────────────────────────────────────────────────────────────────────────┘
;
; All OFF — these mods hook the hot path and cause jitter on a 2-core CPU.
; Все ВЫКЛ — эти моды хукают hot path и дают jitter на 2-ядерном CPU.

[BoostPipeline]
pipe_drawsort=true
scissor_tight=true
vertex_dedup=true
halfres_effects=true
shader_simplify=true
batch_coalesce=true


; ┌──────────────────────────────────────────────────────────────────────────┐
; │  [BoostNetwork]   Network optimisation / Сетевые оптимизации         │
; └──────────────────────────────────────────────────────────────────────────┘
[BoostNetwork]

; EN: Pre-resolve GD server DNS at startup — hides 50-200 ms first-load lag.
; RU: Предрезолв DNS серверов GD при старте — скрывает 50-200 ms первого
;     запроса.
;     [✅ ON]
dns_prefetch=true

; EN: HTTP keep-alive connection pool — reuses sockets between requests.
; RU: HTTP keep-alive pool — переиспользует сокеты между запросами.
;     [✅ ON]
http_pool=true

; EN: Block all network during gameplay. OFF — would break online features
;     like daily challenges and gauntlets.
; RU: Блокировка сети во время геймплея. ВЫКЛ — поломает онлайн-фичи
;     (daily, gauntlets).
;     [❌ OFF — breaks online features]
online_block_gameplay=true

; EN: Cache GET responses (server lists, level previews) for 60 s.
; RU: Кеш GET-ответов (списки серверов, превью уровней) на 60 секунд.
;     [✅ ON]
server_cache=true

; EN: TCP_NODELAY + 64 KB send/recv buffers. Faster small-packet network.
; RU: TCP_NODELAY + 64 KB буферы send/recv. Быстрее на мелких пакетах.
;     [✅ ON]
winsock_opt=true


; ┌──────────────────────────────────────────────────────────────────────────┐
; │  [BoostAudio]   Audio tuning / Тюнинг звука                          │
; └──────────────────────────────────────────────────────────────────────────┘
[BoostAudio]

; EN: Limit FMOD active channels. OFF — can mute legitimate SFX.
; RU: Лимит активных FMOD-каналов. ВЫКЛ — может глушить нужные SFX.
;     [❌ OFF — risk muting SFX]
fmod_channel_limit=true
fmod_max_channels=16

; EN: Force FMOD software mixing. OFF — loses GPU audio offload (GT 630M
;     has its own audio engine).
; RU: Софтверный микс FMOD. ВЫКЛ — теряем GPU audio offload (у GT 630M
;     своя звуковая юнита).
;     [❌ OFF — loses GPU audio offload]
fmod_software_mix=true

; EN: Pin FMOD thread to dedicated core. OFF — on 2-core CPU starves main.
; RU: Pin FMOD-потока на ядро. ВЫКЛ — на 2-ядерном CPU голодит main.
;     [❌ OFF — only 2 cores]
audio_thread_pin=true

; EN: Preload all .mp3/.ogg files. OFF — eats RAM (you have 8 GB total).
; RU: Предзагрузка всех .mp3/.ogg. ВЫКЛ — жрёт RAM (у тебя всего 8 GB).
;     [❌ OFF — RAM-tight]
sound_preload=true

; EN: RAM compression of audio buffers. OFF — adds CPU cost, marginal gain.
; RU: RAM-компрессия аудио-буферов. ВЫКЛ — добавляет CPU-нагрузку, выгода
;     минимальная.
;     [❌ OFF — CPU cost > gain]
audio_ram_compress=true


; ┌──────────────────────────────────────────────────────────────────────────┐
; │  [BoostExtreme]   Extreme system / Экстремальные системные           │
; └──────────────────────────────────────────────────────────────────────────┘
[BoostExtreme]

; EN: Disable ETW event tracing for the process. Tiny but free win.
; RU: Отключение ETW трассировки для процесса. Мелкий, но бесплатный буст.
;     [✅ ON]
etw_disable=true

; EN: Disable Windows Error Reporting for GD process — no Watson dialogs
;     or telemetry uploads on crashes.
; RU: Отключение WER для GD — никаких "Watson"-окон и телеметрии при крашах.
;     [✅ ON]
wer_disable=true

; EN: Strip Zone.Identifier ADS from our DLLs — bypasses SmartScreen
;     "downloaded from internet" prompt on first run.
; RU: Удаляет Zone.Identifier ADS с наших DLL — обходит SmartScreen-окно
;     "скачано из интернета" при первом запуске.
;     [✅ ON]
smartscreen_off=true

; EN: NUMA-aware memory allocation. Single NUMA node on Ivy Bridge laptop —
;     module is a no-op, safe to leave on.
; RU: NUMA-aware аллокация памяти. На Ivy Bridge ноутбуке один NUMA-узел,
;     модуль no-op, безопасно держать включённым.
;     [✅ ON — no-op on single-NUMA system]
numa_aware=true

; EN: Use 2 MB large pages. OFF — needs SeLockMemoryPrivilege (admin).
; RU: 2 MB large pages. ВЫКЛ — требует SeLockMemoryPrivilege (admin).
;     [❌ OFF — admin required]
huge_pages=true

; EN: Disable Windows Superfetch/Prefetcher for GD. OFF — needs admin.
; RU: Отключение Windows Superfetch/Prefetcher для GD. ВЫКЛ — нужен admin.
;     [❌ OFF — admin required]
prefetcher_off=true

; EN: Hard-pin minimum working set (SetProcessWorkingSetSizeEx with
;     QUOTA_LIMITS_HARDWS_MIN_ENABLE). Stops Windows from paging our hot
;     code/data pages out under RAM pressure (browser/IDE/Defender scan in
;     parallel). Real anti-stutter on 8 GB systems where you've got other
;     apps competing for RAM. Auto-enables SE_INC_WORKING_SET_NAME privilege;
;     falls back to soft hint if denied. Tries 384 MB → 256 MB → 192 MB
;     floor in case the system is too tight for the ideal.
; RU: Жёсткая фиксация минимального working set — Windows не сможет выгрузить
;     наши горячие страницы кода/данных под давлением RAM (браузер/IDE/
;     Defender работают параллельно). Реальный anti-stutter на 8 GB системах.
;     Авто-включает привилегию SE_INC_WORKING_SET_NAME; fallback на мягкий
;     hint если нет прав. Пробует 384 → 256 → 192 MB floor.
;     [✅ ON — anti-stutter on RAM-tight systems]
workingset_lock=true

; EN: IDXGIDevice::SetGPUThreadPriority(+7). Bumps the priority of the user-
;     mode driver's GPU command-list submission thread. Default = 0, range
;     [-7..+7]. Helps GD's GPU work win against DWM compositor (which runs
;     on iGPU on Optimus) and any browser GPU process. Tries +7 → +5 → +2
;     in case elevation is required for max priority — harmless on any case.
; RU: Приоритет GPU-потока user-mode драйвера = +7. Помогает GD выиграть
;     конкуренцию за GPU против DWM-композитора (на iGPU при Optimus) и
;     GPU-процесса браузера. Пробует +7 → +5 → +2 если нужна elevation.
;     [✅ ON — boosts GPU command submission]
gpu_thread_prio=true


; ┌──────────────────────────────────────────────────────────────────────────┐
; │  opt-in pipeline (test on your hardware first)           │
; └──────────────────────────────────────────────────────────────────────────┘

; EN: Skip eglSwapBuffers when the frame had zero draw calls (idle menus,
;     paused level, dialog open). Capped at 4 consecutive skips so input
;     latency stays bounded. Saves GPU power on idle scenes — fan stops
;     ramping up while menus are open. Default OFF; some D3D11 swap-chain
;     modes may flicker, test on your hardware before enabling.
; RU: Пропуск eglSwapBuffers на кадрах без draw-call'ов (главное меню,
;     пауза, диалог). Не больше 4 подряд — input lag остаётся ограниченным.
;     Экономит мощность GPU на идле — куллер не разгоняется на меню.
;     По умолчанию OFF; некоторые режимы D3D11 swap-chain могут мерцать,
;     протестируй на своём железе перед включением.
;     [⚠️ OFF — opt-in (test on your hardware first)]
present_skip_idle=false

; EN: Render the entire game at half resolution (W/2 × H/2) into an
;     offscreen FBO, then upscale to the real backbuffer via
;     glBlitFramebuffer with GL_LINEAR filter on Present. Trades visible
;     quality (UI text becomes blurrier) for ~30-50% less fragment shading
;     work. Big win on weak GPUs (GT 630M-class fillrate-bound). Default
;     OFF; visible quality drop, only enable if you really need the FPS.
; RU: Рендер всей игры в половинном разрешении (W/2 × H/2) в offscreen
;     FBO, апскейл до реального backbuffer через glBlitFramebuffer с
;     линейной фильтрацией на Present. Жертвуешь качеством (UI текст
;     блюрнее) ради ~30-50% меньше работы по фрагмент-шейдингу. Огромный
;     выигрыш на слабых GPU (типа GT 630M, fillrate-bound). По умолчанию
;     OFF; включай только если реально нужны FPS, качество заметно падает.
;     [⚠️ OFF — opt-in (visible quality drop)]
halfres_render=false


