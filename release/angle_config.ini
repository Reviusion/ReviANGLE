; ║                                                                          ║
; ║   ▸ Battery-saver / Экономия батареи на ноутбуке:                        ║
; ║       frame_pacing=true   +  frame_pacing_target=60                      ║
; ║       (60 FPS cap — GPU runs cool, ~30% less power draw)                 ║
; ║                                                                          ║
; ║   ▸ VSync-style smoothness / Плавность как с VSync:                      ║
; ║       frame_pacing=true   +  frame_pacing_target=90                      ║
; ║       (matches monitor refresh exactly — lowest jitter)                  ║
; ║                                                                          ║
