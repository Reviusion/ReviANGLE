; ║                                                                          ║
; ║   ▸ Best feel for gameplay  ◀  CURRENT / Текущий пресет:                 ║
; ║       frame_pacing=true   +  frame_pacing_target=180                     ║
; ║       (2× monitor refresh on 90 Hz — minimum input lag, smooth motion,   ║
; ║        zero tearing — verified target preset for GT 630M)                ║
; ║                                                                          ║
; ║   ▸ Max FPS benchmark / Замер максимума:                                 ║
